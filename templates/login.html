<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Planeamento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffa500 0%, #ff8c00 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #ff6600;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #ff6600;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6600 0%, #ff8c00 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 102, 0, 0.4);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        
        .error-message.show {
            display: block;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #ff6600;
            margin-top: 10px;
        }
        
        .user-select-container {
            margin-bottom: 20px;
        }
        
        .user-select-label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .user-select-dropdown {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        
        .user-select-dropdown:focus {
            outline: none;
            border-color: #ff6600;
        }
        
        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔐 Login</h1>
            <p>Sistema de Planeamento de Cargas</p>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <form id="loginForm" onsubmit="fazerLogin(event)">
            <div class="user-select-container">
                <label class="user-select-label">Selecionar Utilizador *</label>
                <select id="userSelect" class="user-select-dropdown" required autofocus onchange="selecionarUtilizador()">
                    <option value="">-- Selecionar utilizador --</option>
                </select>
                <input type="hidden" id="username" name="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn-login" id="btnLogin">
                Entrar
            </button>
            
            <div id="loading" class="loading">A autenticar...</div>
        </form>
        <p style="text-align:center;margin-top:1rem;font-size:13px;"><a href="/partilha" style="color:#1976d2;">Colega não consegue aceder? Ver opções (rede, VPN, servidor)</a></p>
    </div>
    
    <script>
        // Carregar lista de utilizadores ao iniciar
        async function carregarUtilizadores() {
            try {
                const response = await fetch('/api/utilizadores-login');
                if (response.ok) {
                    const utilizadores = await response.json();
                    const select = document.getElementById('userSelect');
                    
                    // Limpar opções existentes (exceto a primeira)
                    while (select.options.length > 1) {
                        select.remove(1);
                    }
                    
                    // Adicionar utilizadores ao dropdown
                    utilizadores.forEach(user => {
                        const option = document.createElement('option');
                        option.value = user.username;
                        option.textContent = user.nome + (user.is_admin ? ' (Admin)' : '');
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Erro ao carregar utilizadores:', error);
            }
        }
        
        function selecionarUtilizador() {
            const select = document.getElementById('userSelect');
            const usernameInput = document.getElementById('username');
            
            if (select.value) {
                usernameInput.value = select.value;
                // Focar no campo de password após selecionar utilizador
                document.getElementById('password').focus();
            }
        }
        
        function mostrarErro(mensagem) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = mensagem;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }
        
        async function fazerLogin(event) {
            event.preventDefault();
            
            const userSelect = document.getElementById('userSelect');
            const username = userSelect.value.trim();
            const password = document.getElementById('password').value;
            const btnLogin = document.getElementById('btnLogin');
            const loading = document.getElementById('loading');
            
            // Atualizar campo hidden com o username selecionado
            document.getElementById('username').value = username;
            
            if (!username || !password) {
                mostrarErro('Por favor, selecione um utilizador e digite a password.');
                return;
            }
            
            btnLogin.disabled = true;
            loading.classList.add('show');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Redirecionar para a página principal
                    window.location.href = '/';
                } else {
                    mostrarErro(data.error || 'Erro ao fazer login. Tente novamente.');
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (error) {
                console.error('Erro ao fazer login:', error);
                mostrarErro('Erro de conexão. Verifique a sua ligação à internet.');
            } finally {
                btnLogin.disabled = false;
                loading.classList.remove('show');
            }
        }
        
        // Permitir login com Enter
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                fazerLogin(e);
            }
        });
        
        // Carregar utilizadores ao iniciar
        carregarUtilizadores();
        
        // Verificar se já está autenticado
        fetch('/api/auth/check')
            .then(response => response.json())
            .then(data => {
                if (data.authenticated) {
                    window.location.href = '/';
                }
            })
            .catch(() => {
                // Ignorar erros - utilizador não autenticado
            });
    </script>
</body>
</html>
