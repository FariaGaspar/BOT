<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Administração - Utilizadores Ativos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-card h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .btn-warning {
            background: #f39c12;
            color: white;
        }
        
        .btn-warning:hover {
            background: #d68910;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-success {
            background: #2ecc71;
            color: white;
        }
        
        .badge-warning {
            background: #f39c12;
            color: white;
        }
        
        .badge-danger {
            background: #e74c3c;
            color: white;
        }
        
        .actions {
            display: flex;
            gap: 5px;
        }
        
        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }
        
        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .auto-refresh input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Painel de Administração - Utilizadores Ativos</h1>
            <button onclick="window.location.href='/'" class="btn-primary">← Voltar ao Sistema</button>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <h3>Utilizadores Ativos</h3>
                <div class="value" id="totalAtivos">0</div>
            </div>
            <div class="stat-card">
                <h3>Utilizadores Bloqueados</h3>
                <div class="value" id="totalBloqueados">0</div>
            </div>
            <div class="stat-card">
                <h3>Última Atualização</h3>
                <div class="value" id="ultimaAtualizacao" style="font-size: 16px;">--:--:--</div>
            </div>
        </div>
        
        <div class="controls">
            <button onclick="carregarUtilizadores()" class="btn-primary">🔄 Atualizar</button>
            <button onclick="bloquearTodos()" class="btn-danger">🚫 Bloquear Todos</button>
            <button onclick="adicionarIPBloqueado()" class="btn-warning" style="background: #f39c12; color: white;">➕ Adicionar IP Bloqueado</button>
            <div class="auto-refresh">
                <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()">
                <label for="autoRefresh">Atualização Automática (5s)</label>
            </div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <h3 style="margin-bottom: 15px; color: #2ecc71;">✅ Utilizadores Ativos</h3>
                <div id="utilizadoresAtivosContainer">
                    <div class="loading">Carregando utilizadores ativos...</div>
                </div>
            </div>
            <div>
                <h3 style="margin-bottom: 15px; color: #e74c3c;">🚫 Utilizadores Bloqueados</h3>
                <div id="utilizadoresBloqueadosContainer">
                    <div class="loading">Carregando utilizadores bloqueados...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let autoRefreshInterval = null;
        
        function carregarUtilizadores() {
            // Incluir código no URL
            const url = '/admin/utilizadores?code=1990';
            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        if (response.status === 403) {
                            throw new Error('Acesso negado. Por favor, insira o código novamente.');
                        }
                        throw new Error('Erro ao carregar utilizadores');
                    }
                    return response.json();
                })
                .then(data => {
                    renderizarUtilizadoresAtivos(data.ativos || []);
                    renderizarUtilizadoresBloqueados(data.bloqueados || []);
                    document.getElementById('totalAtivos').textContent = (data.ativos || []).length;
                    document.getElementById('totalBloqueados').textContent = (data.bloqueados || []).length;
                    document.getElementById('ultimaAtualizacao').textContent = new Date().toLocaleTimeString('pt-PT');
                })
                .catch(error => {
                    console.error('Erro ao carregar utilizadores:', error);
                    document.getElementById('utilizadoresAtivosContainer').innerHTML = 
                        '<div class="empty">Erro ao carregar utilizadores: ' + error.message + '</div>';
                    document.getElementById('utilizadoresBloqueadosContainer').innerHTML = 
                        '<div class="empty">Erro ao carregar utilizadores bloqueados</div>';
                });
        }
        
        function renderizarUtilizadoresAtivos(utilizadores) {
            const container = document.getElementById('utilizadoresAtivosContainer');
            
            if (utilizadores.length === 0) {
                container.innerHTML = '<div class="empty">Nenhum utilizador ativo</div>';
                return;
            }
            
            const table = `
                <div class="table-container" style="max-height: 500px; overflow-y: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>IP</th>
                                <th>Página Atual</th>
                                <th>Método</th>
                                <th>Tempo Inativo</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${utilizadores.map(u => `
                                <tr>
                                    <td><strong>${u.ip}</strong></td>
                                    <td>${u.pagina_atual}</td>
                                    <td><span class="badge badge-success">${u.metodo}</span></td>
                                    <td>${u.tempo_inativo}</td>
                                    <td>
                                        <div class="actions">
                                            <button onclick="bloquearUtilizador('${u.session_id}')" class="btn-danger btn-sm">🚫 Bloquear</button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            
            container.innerHTML = table;
        }
        
        function renderizarUtilizadoresBloqueados(utilizadores) {
            const container = document.getElementById('utilizadoresBloqueadosContainer');
            
            if (utilizadores.length === 0) {
                container.innerHTML = '<div class="empty">Nenhum utilizador bloqueado</div>';
                return;
            }
            
            const table = `
                <div class="table-container" style="max-height: 500px; overflow-y: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>IP</th>
                                <th>Página (quando bloqueado)</th>
                                <th>Data Bloqueio</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${utilizadores.map(u => `
                                <tr style="background: #fee;">
                                    <td><strong>${u.ip}</strong></td>
                                    <td>${u.pagina_atual}</td>
                                    <td>${u.data_bloqueio && u.data_bloqueio !== 'Antes da atualização' ? new Date(u.data_bloqueio).toLocaleString('pt-PT') : u.data_bloqueio || 'N/A'}</td>
                                    <td>
                                        <div class="actions">
                                            ${u.tipo_bloqueio === 'ip' || !u.session_id ? 
                                                `<button onclick="desbloquearIP('${u.ip}')" class="btn-primary btn-sm" style="background: #2ecc71;">✅ Desbloquear IP</button>` :
                                                `<button onclick="desbloquearUtilizador('${u.session_id}')" class="btn-primary btn-sm" style="background: #2ecc71;">✅ Desbloquear</button>`
                                            }
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            
            container.innerHTML = table;
        }
        
        function bloquearUtilizador(sessionId) {
            if (!confirm('Tem certeza que deseja bloquear este utilizador?')) {
                return;
            }
            
            fetch(`/admin/utilizadores/${sessionId}?code=1990`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('✅ Utilizador bloqueado com sucesso!');
                    carregarUtilizadores();
                } else {
                    alert('❌ Erro ao bloquear utilizador: ' + (data.error || 'Erro desconhecido'));
                }
            })
            .catch(error => {
                console.error('Erro ao bloquear utilizador:', error);
                alert('❌ Erro ao bloquear utilizador');
            });
        }
        
        function desbloquearUtilizador(sessionId) {
            if (!confirm('Tem certeza que deseja desbloquear este utilizador?')) {
                return;
            }
            
            fetch(`/admin/utilizadores/${sessionId}/desbloquear?code=1990`, {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('✅ Utilizador desbloqueado com sucesso!');
                    carregarUtilizadores();
                } else {
                    alert('❌ Erro ao desbloquear utilizador: ' + (data.error || 'Erro desconhecido'));
                }
            })
            .catch(error => {
                console.error('Erro ao desbloquear utilizador:', error);
                alert('❌ Erro ao desbloquear utilizador');
            });
        }
        
        function desbloquearIP(ip) {
            console.log('Desbloquear IP chamado com:', ip);
            if (!confirm(`Tem certeza que deseja desbloquear o IP ${ip}?`)) {
                return;
            }
            
            // Codificar o IP para URL (pode conter pontos)
            const ipEncoded = encodeURIComponent(ip);
            console.log('IP codificado:', ipEncoded);
            
            fetch(`/admin/utilizadores/ip/${ipEncoded}/desbloquear?code=1990`, {
                method: 'POST'
            })
            .then(response => {
                console.log('Resposta do servidor:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('Dados recebidos:', data);
                if (data.success) {
                    alert('✅ IP desbloqueado com sucesso!');
                    carregarUtilizadores();
                } else {
                    alert('❌ Erro ao desbloquear IP: ' + (data.error || 'Erro desconhecido'));
                }
            })
            .catch(error => {
                console.error('Erro ao desbloquear IP:', error);
                alert('❌ Erro ao desbloquear IP: ' + error.message);
            });
        }
        
        function bloquearTodos() {
            if (!confirm('Tem certeza que deseja bloquear TODOS os utilizadores ativos?')) {
                return;
            }
            
            fetch('/admin/utilizadores?code=1990', {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('✅ Todos os utilizadores foram bloqueados!');
                    carregarUtilizadores();
                } else {
                    alert('❌ Erro ao bloquear utilizadores: ' + (data.error || 'Erro desconhecido'));
                }
            })
            .catch(error => {
                console.error('Erro ao bloquear utilizadores:', error);
                alert('❌ Erro ao bloquear utilizadores');
            });
        }
        
        function adicionarIPBloqueado() {
            const ip = prompt('Digite o IP que deseja adicionar à lista de bloqueados:\n\n(Exemplo: 10.10.11.66)');
            if (!ip || !ip.trim()) {
                return;
            }
            
            const ipLimpo = ip.trim();
            // Validação básica de IP
            const ipRegex = /^(\d{1,3}\.){3}\d{1,3}$/;
            if (!ipRegex.test(ipLimpo)) {
                alert('❌ Formato de IP inválido. Use o formato: 192.168.1.1');
                return;
            }
            
            if (!confirm(`Tem certeza que deseja adicionar o IP ${ipLimpo} à lista de bloqueados?`)) {
                return;
            }
            
            const ipEncoded = encodeURIComponent(ipLimpo);
            
            fetch(`/admin/utilizadores/ip/${ipEncoded}/adicionar?code=1990`, {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('✅ IP adicionado à lista de bloqueados com sucesso!');
                    carregarUtilizadores();
                } else {
                    alert('❌ Erro ao adicionar IP: ' + (data.error || 'Erro desconhecido'));
                }
            })
            .catch(error => {
                console.error('Erro ao adicionar IP:', error);
                alert('❌ Erro ao adicionar IP');
            });
        }
        
        function toggleAutoRefresh() {
            const checkbox = document.getElementById('autoRefresh');
            if (checkbox.checked) {
                autoRefreshInterval = setInterval(carregarUtilizadores, 5000);
            } else {
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                    autoRefreshInterval = null;
                }
            }
        }
        
        // Carregar utilizadores ao carregar a página
        carregarUtilizadores();
        
        // Atualizar a cada 5 segundos por padrão
        setInterval(carregarUtilizadores, 5000);
    </script>
</body>
</html>
